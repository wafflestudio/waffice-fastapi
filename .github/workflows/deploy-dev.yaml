name: Deploy to AWS ECR (Dev)

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: waffice-dev/waffice-server
  ENVIRONMENT: dev

jobs:
  deploy:
    name: Build and Push to ECR (dev)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Oracle Cloud Infrastructure Registry
        uses: docker/login-action@v3
        with:
          registry: yny.ocir.io
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_AUTH_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Docker
        id: meta
        run: |
          echo "timestamp=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: |
            yny.ocir.io/ax1dvc8vmenm/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.timestamp }}
          build-args: |
            ENV=dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: |
          echo "Image pushed successfully to ${{ env.ENVIRONMENT }}!"
          echo "Repository: yny.ocir.io/ax1dvc8vmenm/${{ env.ECR_REPOSITORY }}"
          echo "Tag: ${{ steps.meta.outputs.timestamp }}"
