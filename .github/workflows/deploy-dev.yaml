name: Deploy to AWS ECR (Dev)

on:
  push:
    branches:
      - main

env:
  OCIR_REGISTRY: yny.ocir.io
  OCIR_NAMESPACE: ax1dvc8vmenm
  OCIR_REPOSITORY: waffice-dev/waffice-server
  ENVIRONMENT: dev

jobs:
  deploy:
    name: Build and Push to OCIR (dev)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to OCIR
        run: echo "${{ secrets.OCIR_AUTH_TOKEN }}" | docker login $OCIR_REGISTRY -u $OCIR_NAMESPACE/members/waffle-deployer --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Docker
        id: meta
        run: |
          echo "timestamp=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.OCIR_REGISTRY }}/${{ env.OCIR_NAMESPACE }}/${{ env.OCIR_REPOSITORY }}:${{ steps.meta.outputs.timestamp }}
          build-args: |
            ENV=dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: |
          echo "Image pushed successfully to ${{ env.ENVIRONMENT }}!"
          echo "Repository: ${{ env.OCIR_REGISTRY }}/${{ env.OCIR_NAMESPACE }}/${{ env.OCIR_REPOSITORY }}"
          echo "Tag: ${{ steps.meta.outputs.timestamp }}"
